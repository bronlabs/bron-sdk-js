info:
  name: bron-sdk
  version: "1.0"
  category: libs

include:
  - file: /etc/serve/include.d/library.yml

build:
  - node: pnpm install && pnpm run build

promote:
  - node:
      node: >
        pnpm install &&
        pnpm run build &&
        pnpm version {{ info.build-version }} --no-git-tag-version &&
        HTTPS_PROXY="$BRON_HTTP_PROXY" HTTP_PROXY="$BRON_HTTP_PROXY"
        script -qec "pnpm publish --no-git-checks" /dev/null
      envs:
        BRON_HTTP_PROXY: ""
